<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}code-light{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f7f7f4;
            --surface: #ffffff;
            --surface-2: #f3f4f1;
            --surface-3: #eceee9;
            --text: #111311;
            --muted: #6b706a;
            --subtle: #92978f;
            --line: #dedfd9;
            --line-strong: #c8cbc2;
            --brand: #111311;
            --idle: #8b95a1;
            --working: #22a06b;
            --done: #3178c6;
            --waiting: #b7791f;
            --error: #c2413b;
            --quota: #d46b08;
            --offline: #71766f;
            --shadow: 0 18px 42px rgba(17, 19, 17, 0.07);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 14px;
            line-height: 1.45;
        }
        button { font: inherit; }
        .app {
            display: grid;
            grid-template-columns: 224px minmax(0, 1fr);
            min-height: 100vh;
        }
        .sidebar {
            border-right: 1px solid var(--line);
            background: #fbfbf8;
            padding: 18px 14px;
            position: sticky;
            top: 0;
            height: 100vh;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 8px 18px;
            border-bottom: 1px solid var(--line);
        }
        .brand-mark {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            background: var(--brand);
            color: white;
            display: grid;
            place-items: center;
            font-size: 12px;
            font-weight: 700;
        }
        .brand-title { font-weight: 700; letter-spacing: 0; }
        .brand-subtitle { color: var(--muted); font-size: 12px; margin-top: 1px; }
        .nav-group { padding-top: 16px; }
        .nav-label {
            padding: 0 8px 8px;
            color: var(--subtle);
            font-size: 11px;
            font-weight: 650;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .nav-button {
            width: 100%;
            border: 0;
            background: transparent;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            border-radius: 7px;
            cursor: pointer;
        }
        .nav-button:hover, .nav-button.active { background: var(--surface-3); }
        .main { min-width: 0; padding: 20px 24px 28px; }
        .topline {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }
        .eyebrow { color: var(--muted); font-size: 12px; font-weight: 650; }
        h1 { margin: 2px 0 0; font-size: 26px; line-height: 1.15; letter-spacing: 0; }
        .actions { display: flex; gap: 8px; }
        .button {
            border: 1px solid var(--line-strong);
            background: var(--surface);
            color: var(--text);
            height: 34px;
            padding: 0 12px;
            border-radius: 7px;
            cursor: pointer;
            box-shadow: 0 1px 0 rgba(17, 19, 17, 0.04);
        }
        .button.primary { background: var(--brand); color: white; border-color: var(--brand); }
        .button:hover { border-color: #a5aaa0; }
        .grid { display: grid; gap: 12px; }
        .overview-grid { grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.65fr); }
        .agent-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 10px;
            box-shadow: var(--shadow);
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 15px 10px;
            border-bottom: 1px solid var(--line);
        }
        .panel-title { font-weight: 700; }
        .panel-subtitle { color: var(--muted); font-size: 12px; margin-top: 1px; }
        .panel-body { padding: 14px 15px; }
        .agent-card {
            padding: 14px;
            cursor: pointer;
            box-shadow: none;
            transition: border-color 0.14s, background 0.14s;
        }
        .agent-card:hover { border-color: var(--line-strong); background: #fdfdfb; }
        .agent-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        .agent-name { font-size: 15px; font-weight: 750; }
        .session-id { color: var(--muted); font-size: 12px; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-width: 88px;
            justify-content: center;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 5px 9px;
            color: var(--muted);
            background: var(--surface-2);
            font-size: 12px;
            font-weight: 650;
            white-space: nowrap;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: var(--offline); }
        .status-idle { background: var(--idle); }
        .status-working { background: var(--working); }
        .status-done { background: var(--done); }
        .status-waiting { background: var(--waiting); }
        .status-error { background: var(--error); }
        .status-quota_warning { background: var(--quota); }
        .status-offline { background: var(--offline); }
        .metric-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
        .metric {
            background: var(--surface-2);
            border: 1px solid #e7e8e2;
            border-radius: 8px;
            padding: 9px;
            min-width: 0;
        }
        .metric-label { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
        .metric-value { font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .bar { height: 8px; background: var(--surface-3); border-radius: 999px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--done); border-radius: inherit; transition: width 0.2s ease; }
        .quota-main {
            display: grid;
            gap: 9px;
        }
        .quota-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
        .quota-percent { font-size: 28px; line-height: 1; font-weight: 800; }
        .quota-window {
            display: grid;
            gap: 6px;
            padding-top: 8px;
            border-top: 1px solid var(--line);
        }
        .quota-window:first-of-type { padding-top: 0; border-top: 0; }
        .quota-window-label {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 12px;
        }
        .muted { color: var(--muted); }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); white-space: nowrap; }
        th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; background: #fafaf7; }
        td { font-size: 13px; }
        tr:last-child td { border-bottom: 0; }
        .path-cell { max-width: 360px; overflow: hidden; text-overflow: ellipsis; }
        .summary-list { display: grid; gap: 8px; }
        .summary-row { display: flex; justify-content: space-between; gap: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--line); }
        .summary-row:last-child { border-bottom: 0; padding-bottom: 0; }

        @media (max-width: 980px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
            .overview-grid, .agent-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 720px) {
            .main { padding: 16px; }
            .topline { flex-direction: column; }
            .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">CL</div>
                <div>
                    <div class="brand-title">code-light</div>
                    <div class="brand-subtitle">Agent runtime monitor</div>
                </div>
            </div>
            <div class="nav-group">
                <div class="nav-label">Workspace</div>
                <button class="nav-button active" type="button" onclick="refreshAll()">
                    <span>Dashboard</span><span id="nav-session-count">0</span>
                </button>
                <button class="nav-button" type="button" onclick="window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'})">
                    <span>Sessions</span><span>live</span>
                </button>
            </div>
        </aside>

        <main class="main">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        const statusLabels = {
            idle: "Idle",
            working: "Working",
            done: "Done",
            waiting: "Waiting",
            error: "Error",
            quota_warning: "Quota",
            offline: "Offline",
        };

        function formatNumber(value) {
            return Number(value || 0).toLocaleString();
        }

        function formatTime(iso) {
            if (!iso) return "No activity";
            const date = new Date(iso);
            return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
        }

        function formatReset(value) {
            if (!value) return "Unknown";
            if (typeof value === "number") return formatTime(new Date(value * 1000).toISOString());
            if (/^\d+$/.test(String(value))) return formatTime(new Date(Number(value) * 1000).toISOString());
            return formatTime(value);
        }

        function formatWindowLabel(windowData, fallback) {
            const minutes = Number(windowData?.window_minutes || 0);
            const seconds = Number(windowData?.limit_window_seconds || 0);
            const totalMinutes = minutes || Math.round(seconds / 60);
            if (!totalMinutes) return fallback;
            if (totalMinutes % 10080 === 0) return `${totalMinutes / 10080} week limit`;
            if (totalMinutes % 1440 === 0) return `${totalMinutes / 1440} day limit`;
            if (totalMinutes % 60 === 0) return `${totalMinutes / 60}h limit`;
            return `${totalMinutes}m limit`;
        }

        function quotaWindowHtml(label, windowData) {
            const pct = Math.max(0, Math.min(100, Number(windowData?.used_percent || 0)));
            const reset = formatReset(windowData?.reset_at ?? windowData?.resets_at);
            return `
                <div class="quota-window">
                    <div class="quota-window-label">
                        <strong>${label}</strong>
                        <span>${pct.toFixed(1)}%</span>
                    </div>
                    <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
                    <div class="muted">Reset ${reset}</div>
                </div>
            `;
        }

        function agentName(value) {
            return value === "claude_code" ? "Claude Code" : "Codex";
        }

        async function refreshStatus() {
            const response = await fetch("/api/status");
            const statuses = await response.json();
            statuses.forEach((status) => {
                const card = document.getElementById(`card-${status.agent_type}`);
                if (!card) return;

                card.querySelector(".status-dot").className = `status-dot status-${status.status}`;
                card.querySelector(".status-text").textContent = statusLabels[status.status] || status.status;
                card.querySelector(".session-id").textContent = status.session_id || "No session id";
                card.querySelector(".metric-model").textContent = status.model || "Unknown";
                card.querySelector(".metric-tokens").textContent = formatNumber(status.tokens?.total);
                card.querySelector(".metric-activity").textContent = formatTime(status.last_activity);
                card.querySelector(".metric-project").textContent = status.project_path || "No project";
            });
        }

        async function refreshSessions() {
            const response = await fetch("/api/sessions");
            const sessions = await response.json();
            const body = document.getElementById("session-table-body");
            const count = document.getElementById("nav-session-count");
            if (count) count.textContent = sessions.length;
            if (!body) return;

            if (!sessions.length) {
                body.innerHTML = '<tr><td colspan="7" class="muted">No sessions detected yet.</td></tr>';
                return;
            }

            body.innerHTML = sessions.map((session) => `
                <tr>
                    <td>${agentName(session.agent_type)}</td>
                    <td><span class="status-pill"><span class="status-dot status-${session.status}"></span>${statusLabels[session.status] || session.status}</span></td>
                    <td>${session.model || "Unknown"}</td>
                    <td>${formatNumber(session.tokens?.total)}</td>
                    <td>${formatTime(session.last_activity)}</td>
                    <td class="path-cell" title="${session.project_path || ""}">${session.project_path || "No project"}</td>
                    <td title="${session.session_id || ""}">${session.session_id || ""}</td>
                </tr>
            `).join("");
        }

        async function refreshQuota() {
            const response = await fetch("/api/quota");
            const quotas = await response.json();
            const container = document.getElementById("quota-panel");
            if (!container) return;

            const codex = quotas.codex;
            if (!codex) {
                container.innerHTML = '<div class="muted">No Codex quota data yet.</div>';
                return;
            }

            const extra = codex.extra_info || {};
            const primary = extra.primary_window || extra.primary || {
                used_percent: codex.used_percent,
                limit_window_seconds: codex.limit_window_seconds,
                reset_at: codex.reset_at,
            };
            const secondary = extra.secondary_window || extra.secondary;
            const windows = [
                quotaWindowHtml(formatWindowLabel(primary, "5h limit"), primary),
                secondary ? quotaWindowHtml(formatWindowLabel(secondary, "Weekly limit"), secondary) : "",
            ].join("");

            container.innerHTML = `
                <div class="quota-main">
                    <div class="quota-row">
                        <div>
                            <div class="muted">Plan</div>
                            <strong>${codex.plan_name || "Codex"}</strong>
                        </div>
                        <div class="quota-percent">${Math.max(0, Math.min(100, Number(primary?.used_percent || 0))).toFixed(1)}%</div>
                    </div>
                    ${windows}
                    <div class="muted">Credits ${codex.credits_balance ?? "unknown"}</div>
                </div>
            `;
        }

        async function refreshUsageSummary() {
            const response = await fetch("/api/usage?days=7");
            const data = await response.json();
            const container = document.getElementById("usage-summary");
            if (!container) return;

            container.innerHTML = Object.entries(data).map(([agent, usage]) => `
                <div class="summary-row">
                    <span>${agentName(agent)}</span>
                    <strong>${formatNumber(usage.total_tokens)} tokens</strong>
                </div>
            `).join("");
        }

        async function focusAgent(agentType) {
            await fetch("/api/focus", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ agent_type: agentType }),
            });
        }

        async function refreshAll() {
            await Promise.all([refreshStatus(), refreshSessions(), refreshQuota(), refreshUsageSummary()]);
        }

        refreshAll();
        setInterval(refreshAll, 10000);
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
